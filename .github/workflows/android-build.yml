name: Android Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许首次生成的 debug.keystore 提交回仓库

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Ensure fixed debug keystore
        id: keystore
        run: |
          if [ ! -f app/debug.keystore ]; then
            echo "debug.keystore 不存在，生成固定凭证的 keystore（仅首次）"
            keytool -genkeypair -v \
              -keystore app/debug.keystore \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10950 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "复用已提交的 app/debug.keystore"
            echo "generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated keystore (first time only)
        if: steps.keystore.outputs.generated == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f app/debug.keystore
          git commit -m "ci: 提交固定 debug keystore 以统一签名"
          git push

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Prepare named APK for Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "=== Preparing release artifact for v${VERSION} ==="
          echo "Listing build outputs:"
          ls -la app/build/outputs/apk/debug/ || true
          ls -la app/build/outputs/apk/release/ || true

          RELEASE_APK=""
          # 优先精确匹配 release 产物
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            RELEASE_APK="app/build/outputs/apk/release/app-release.apk"
          else
            # 兼容不同 Gradle/Android 插件输出命名，找任意 release apk
            RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -n 1 || true)
          fi

          if [ -n "$RELEASE_APK" ] && [ -f "$RELEASE_APK" ]; then
            echo "Using release APK: $RELEASE_APK"
            cp "$RELEASE_APK" "ClawNode-${VERSION}.apk"
          else
            echo "ERROR: No release APK found under app/build/outputs/apk/release/"
            echo "This is a release build — we should never fall back to debug for tagged releases."
            echo "Build artifacts:"
            find app/build/outputs/apk -name "*.apk" -exec ls -l {} \; || true
            exit 1
          fi

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "tag": "${GITHUB_REF_NAME}",
            "apk": "ClawNode-${VERSION}.apk",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/ClawNode-${VERSION}.apk"
          }
          EOF

          echo "=== Prepared files ==="
          ls -la ClawNode-*.apk latest.json
          echo "File type check:"
          file "ClawNode-${VERSION}.apk" || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawnode-apk
          retention-days: 30
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClawNode-*.apk
            latest.json
          generate_release_notes: true

      - name: Update latest.json on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "=== Updating latest.json on main branch for ${GITHUB_REF_NAME} ==="
          git fetch origin main

          # 彻底清理 tag 检出时留下的脏文件（Prepare 步骤会生成 latest.json 和 ClawNode-*.apk）
          # 这是历史遗留问题：之前只用 debug APK + 没有清理导致 checkout 失败
          git reset --hard
          git clean -fdx

          # 更稳健的方式：强制将本地 main 指向远程 main，避免 checkout 时的各种脏状态问题
          git checkout -B main origin/main

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "tag": "${GITHUB_REF_NAME}",
            "apk": "ClawNode-${VERSION}.apk",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/ClawNode-${VERSION}.apk"
          }
          EOF

          git add latest.json
          if git diff --cached --quiet; then
            echo "No changes to latest.json, skipping commit"
          else
            git commit -m "chore: update latest.json for ${GITHUB_REF_NAME}"
            git push origin main
            echo "latest.json on main updated to ${VERSION}"
          fi
