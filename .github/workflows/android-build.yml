name: Android Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许首次生成的 debug.keystore 提交回仓库

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Ensure fixed debug keystore
        id: keystore
        run: |
          if [ ! -f app/debug.keystore ]; then
            echo "debug.keystore 不存在，生成固定凭证的 keystore（仅首次）"
            keytool -genkeypair -v \
              -keystore app/debug.keystore \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10950 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "复用已提交的 app/debug.keystore"
            echo "generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated keystore (first time only)
        if: steps.keystore.outputs.generated == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f app/debug.keystore
          git commit -m "ci: 提交固定 debug keystore 以统一签名"
          git push

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Prepare named APK for Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp app/build/outputs/apk/debug/app-debug.apk "ClawNode-${VERSION}.apk"
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "tag": "${GITHUB_REF_NAME}",
            "apk": "ClawNode-${VERSION}.apk",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/ClawNode-${VERSION}.apk"
          }
          EOF
          ls -la ClawNode-*.apk latest.json

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawnode-apk
          retention-days: 30
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClawNode-*.apk
            latest.json
          generate_release_notes: true

      - name: Update latest.json on main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "tag": "${GITHUB_REF_NAME}",
            "apk": "ClawNode-${VERSION}.apk",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/ClawNode-${VERSION}.apk"
          }
          EOF
          git add latest.json
          git diff --cached --quiet || git commit -m "chore: update latest.json for ${GITHUB_REF_NAME}"
          git push origin main
